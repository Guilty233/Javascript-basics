<!DOCTYPE html>
<html lang="en">
    <head>
    <title>DOM</title>
    </head>
  <body>
    <button>hello</button>
    <button class = "js-button">second button</button>
    <script>
      console.log(document.querySelector('button').innerHTML); // outputs the first button element in the document
      document.querySelector('button').innerHTML = 'Hello, World!'; // changes the inner HTML of the first button element in the document
      console.log(document.querySelector('.js-button')); // outputs the inner HTML of the button with class 'js-button'
      const buttonelement = document.querySelector('.js-button'); // selects the button element with class 'js-button' and stores it in a variable
      console.log(buttonelement); // outputs the inner HTML of the button element stored in the variable
      /*
      console.log(document.title); // outputs the title of the page
      document.title = 'DOM Manipulation'; // changes the title of the page
      console.log(document.body.innerHTML); // outputs the HTML content of the body
      */
    </script>
  </body>
</html>
