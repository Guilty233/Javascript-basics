<!DOCTYPE html>
<html lang="en">
    <head>
    <title>DOM Projects</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
      }
      .subscribe-button {
        font-weight: bold;
        border: none;
        background-color: black;
        color:white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 50px;
        cursor: pointer;
        margin-bottom: 30px;
      }
      .subscribe-button.subscribed {
        background-color: rgb(240, 240, 240);
        color: black;
      }
      .cost-input{
        font-size: 15px;
        padding: 10px;
        
      }      
      .calculate-button{
        background-color: green;
        color: white;
        border: none;
        font-size: 15px;
        padding: 12px 50px;
        cursor: pointer;

      }
    </style>
    </head>
  <body>
    <p>YouTube</p>
    <button class="js-subscribe-button subscribe-button" onclick="subscribe()" >Subscribe</button>
    <p>Amazon Shipping Calculator</p>
    <p class="js-total"></p>
    <input placeholder="Cost of order" class="js-cost-input cost-input" onkeydown="handleKeyDown(event);"></input>
    <button onclick="calculateTotal()" class="calculate-button">Calculate</button>
    <script>
      function calculateTotal(){
        const inputElement = document.querySelector('.js-cost-input');
        let cost = parseFloat(inputElement.value);
        if (cost < 40){
          cost += 10;
        }
        document.querySelector('.js-total').innerHTML = `Total cost: $${cost}`;
      }
      function subscribe(){
        const buttonElement = document.querySelector('.js-subscribe-button'); 
        if(buttonElement.innerHTML === 'Subscribe'){
          buttonElement.innerHTML = 'Subscribed';
          buttonElement.classList.add('subscribed');
        }
        else{
          buttonElement.innerHTML = 'Subscribe';
          buttonElement.classList.remove('subscribed');
        }
      }
    </script>
  </body>
</html>
