<!DOCTYPE html>
<html lang="en">
  <head>
  <title>Paper, Rock, Scissors</title>
  <link rel="stylesheet" href="styles/12-rock-paper-scissors.css">
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button class="move-button js-rock-button"><img src="images/rock-emoji.png" class="move-icon"></button> <!-- move-button is used to style all three buttons, and the class move-icon is used to style the images inside the buttons -->
    <button class="move-button js-paper-button"><img src="images/paper-emoji.png" class="move-icon"></button>
    <button class="move-button js-scissors-button"><img src="images/scissors-emoji.png" class="move-icon"></button>
    <p class = "js-result result">You win</p>
    <p class = "js-moves"></p>
    <p class = "js-score score"></p>
    <button onclick="resetScore()" class ="reset-score-button">Reset</button>
    <button onclick="autoPlay()" class="auto-play-button">Auto Play</button>
    <button onclick="stopAutoPlay()" class="stop-auto-play-button">Stop Auto Play</button>
    <script src="scripts/12-rock-paper-scissors.js"></script>
      
  </body>
</html>
