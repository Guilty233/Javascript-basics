<!DOCTYPE html>
<html lang="en">
  <head>
  <title>Paper, Rock, Scissors</title>
  <link rel="stylesheet" href="styles/10-rock-paper-scissors.css">
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    " class="move-button"><img src="images/rock-emoji.png" class="move-icon"></button> <!-- move-button is used to style all three buttons, and the class move-icon is used to style the images inside the buttons -->
    <button onclick="
      playGame('paper');
    " class="move-button"><img src="images/paper-emoji.png" class="move-icon"></button>
    <button onclick="
    playGame('scissors')
    " class="move-button"><img src="images/scissors-emoji.png" class="move-icon"></button>
    <p class = "js-result result">You win</p>
    <p class = "js-moves"></p>
    <p class = "js-score score"></p>
    <button onclick="resetScore()" class ="reset-score-button">Reset</button>
    <script src="scripts/10-rock-paper-scissors.js"></script>
      
  </body>
</html>
